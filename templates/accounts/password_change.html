{% extends "base.html" %}
{% block title %}Change Password{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
  <div class="mb-6">
    <h1 class="text-2xl font-bold tracking-tight" style="color:var(--color-ink)">Change Password</h1>
    <p class="text-sm mt-1" style="color:var(--color-ink-muted)">Update your account password</p>
  </div>

  <div class="ts-card">
    <div class="ts-card-body">
      <form method="post" class="space-y-4">
        {% csrf_token %}
        {% for field in form %}
        <div class="ts-form-group">
          <label class="ts-label">{{ field.label }}</label>
          <div class="ts-input-wrapper">
            <i data-lucide="lock" class="ts-input-icon w-4 h-4"></i>
            {{ field }}
          </div>
          {% if field.errors %}<p class="ts-field-error">{{ field.errors.0 }}</p>{% endif %}
        </div>
        {% endfor %}

        <div class="flex gap-3 pt-2">
          <button type="submit" class="ts-btn ts-btn-primary">
            <i data-lucide="check" class="w-4 h-4"></i>
            Update password
          </button>
          <a href="{% url 'profile' %}" class="ts-btn ts-btn-ghost">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
