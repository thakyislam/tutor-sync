{% extends "base_auth.html" %}
{% block title %}Page Not Found{% endblock %}

{% block auth_content %}
<div class="text-center max-w-md mx-auto">
  <div class="inline-flex items-center justify-content mb-6" style="background:var(--gradient-subtle);border-radius:var(--radius-2xl);padding:var(--space-6)">
    <i data-lucide="map-off" class="w-16 h-16" style="color:var(--color-ink-faint)"></i>
  </div>
  <h1 class="text-6xl font-bold tracking-tight mb-2" style="background:var(--gradient-brand);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">404</h1>
  <h2 class="text-xl font-semibold mb-3" style="color:var(--color-ink)">Page not found</h2>
  <p class="text-sm mb-8" style="color:var(--color-ink-muted)">
    The page you're looking for doesn't exist or has been moved.
  </p>
  <a href="/" class="ts-btn ts-btn-primary ts-btn-lg">
    <i data-lucide="home" class="w-4 h-4"></i>
    Back to home
  </a>
</div>
{% endblock %}
