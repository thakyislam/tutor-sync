{% extends "base_auth.html" %}
{% block title %}Server Error{% endblock %}

{% block auth_content %}
<div class="text-center max-w-md mx-auto">
  <div class="inline-flex items-center justify-content mb-6" style="background:var(--gradient-subtle);border-radius:var(--radius-2xl);padding:var(--space-6)">
    <i data-lucide="server-crash" class="w-16 h-16" style="color:var(--color-ink-faint)"></i>
  </div>
  <h1 class="text-6xl font-bold tracking-tight mb-2" style="background:var(--gradient-brand);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">500</h1>
  <h2 class="text-xl font-semibold mb-3" style="color:var(--color-ink)">Something went wrong</h2>
  <p class="text-sm mb-8" style="color:var(--color-ink-muted)">
    We encountered an unexpected error. Please try again, or contact support if the problem persists.
  </p>
  <a href="/" class="ts-btn ts-btn-primary ts-btn-lg">
    <i data-lucide="refresh-cw" class="w-4 h-4"></i>
    Try again
  </a>
</div>
{% endblock %}
